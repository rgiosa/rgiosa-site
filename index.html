<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rGiosa.com — AI Digital Solutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #0f0f0f;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --white: #f5f2ee;
      --muted: #6b6560;
      --line: rgba(201,168,76,0.2);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      overflow: hidden;
    }

    /* Subtle noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* Radial glow */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 900px;
      height: 600px;
      background: radial-gradient(ellipse at center, rgba(201,168,76,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* Top decorative line */
    .deco-top {
      position: absolute;
      top: 3rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.2s forwards;
    }

    .deco-top .line {
      width: 80px;
      height: 1px;
      background: var(--line);
    }

    .deco-top span {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 400;
    }

    /* Corner marks */
    .corner {
      position: fixed;
      width: 24px;
      height: 24px;
      opacity: 0;
      animation: fadeIn 1.2s ease 1s forwards;
    }
    .corner--tl { top: 2rem; left: 2rem; border-top: 1px solid var(--line); border-left: 1px solid var(--line); }
    .corner--tr { top: 2rem; right: 2rem; border-top: 1px solid var(--line); border-right: 1px solid var(--line); }
    .corner--bl { bottom: 2rem; left: 2rem; border-bottom: 1px solid var(--line); border-left: 1px solid var(--line); }
    .corner--br { bottom: 2rem; right: 2rem; border-bottom: 1px solid var(--line); border-right: 1px solid var(--line); }

    /* Main content */
    .main {
      text-align: center;
      max-width: 700px;
    }

    .eyebrow {
      font-size: 0.6rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 400;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.4s forwards;
    }

    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(5rem, 14vw, 10rem);
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: -0.02em;
      opacity: 0;
      animation: fadeUp 1s ease 0.6s forwards;
      position: relative;
      display: inline-block;
    }

    .brand em {
      font-style: italic;
      color: var(--gold);
    }

    /* Thin horizontal rule */
    .rule {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      margin: 2.5rem auto;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.9s forwards;
    }

    .rule::before, .rule::after {
      content: '';
      display: block;
      height: 1px;
      width: 60px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .rule::after {
      background: linear-gradient(to left, transparent, var(--gold));
    }

    .rule-dot {
      width: 4px;
      height: 4px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    .slogan {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      font-weight: 300;
      color: var(--white);
      letter-spacing: 0.03em;
      line-height: 1.5;
      opacity: 0;
      animation: fadeUp 0.9s ease 1.1s forwards;
    }

    .slogan strong {
      font-style: normal;
      font-weight: 400;
      color: var(--gold-light);
    }

    /* Bottom */
    .bottom {
      position: absolute;
      bottom: 3rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 1.4s forwards;
    }

    .bottom .line {
      width: 60px;
      height: 1px;
      background: var(--line);
    }

    .bottom span {
      font-size: 0.55rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Cursor glow effect */
    .cursor-glow {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.04) 0%, transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: left 0.4s ease, top 0.4s ease;
      z-index: 0;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Subtle pulse on brand */
    .brand::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 2px;
      background: radial-gradient(ellipse at center, rgba(201,168,76,0.03) 0%, transparent 70%);
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
  </style>
</head>
<body>

  <div class="cursor-glow" id="glow"></div>

  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <div class="deco-top">
    <span class="line"></span>
    <span>Est. 2025</span>
    <span class="line"></span>
  </div>

  <div class="container">
    <div class="main">
      <p class="eyebrow">Digital Intelligence Solutions</p>
      <h1 class="brand"><em>r</em>Giosa</h1>
      <div class="rule"><span class="rule-dot"></span></div>
      <p class="slogan">Where <strong>human vision</strong> meets<br>the intelligence of tomorrow</p>
    </div>
  </div>

  <div class="bottom">
    <span class="line"></span>
    <span>rgiosa.com</span>
    <span class="line"></span>
  </div>

  <script>
    const glow = document.getElementById('glow');
    document.addEventListener('mousemove', e => {
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
    });
  </script>
</body>
</html>
